services:
  api:
    image: python:3.12-slim
    working_dir: /app/backend
    command: python -m app.main
    env_file:
      - .env
    volumes:
      - .:/app
      - ./data:/app/backend/data
    ports:
      - "8088:8088"

  web:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3008"
    env_file:
      - .env
    environment:
      VITE_DEV_API_PROXY_TARGET: http://api:8088
    volumes:
      - .:/app
    ports:
      - "3008:3008"
    depends_on:
      - api

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./output:/app/output
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8088/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3008:3008"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3008/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
